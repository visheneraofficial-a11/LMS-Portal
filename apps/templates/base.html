{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ENABLE PROGRAM – Premier Education Platform{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Ex Navodayan Foundation's integrated learning platform for JEE/NEET preparation with live classes, assessments, and progress tracking.{% endblock %}">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts - Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome 6.5.1 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- AOS - Animate On Scroll -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  
  {% block extra_css %}{% endblock %}
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='67' font-size='50' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>E</text></svg>">
</head>
<body>
  {% block body %}{% endblock %}
  
  <!-- AOS Init -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true, offset: 80 });</script>
  
  {% block extra_js %}{% endblock %}
</body>
</html>
