# =============================================================================
# LMS Enterprise - Daphne (ASGI) Configuration
# For WebSocket connections via Django Channels
# Systemd service runs: daphne -u /u01/app/django/run/daphne.sock lms_enterprise.asgi:application
# =============================================================================

# Daphne is configured via command-line arguments in the systemd service file.
# This file documents the recommended settings.

# Recommended command:
# daphne \
#   --unix-socket /u01/app/django/run/daphne.sock \
#   --access-log /u01/app/django/logs/daphne-access.log \
#   --proxy-headers \
#   --verbosity 1 \
#   lms_enterprise.asgi:application
